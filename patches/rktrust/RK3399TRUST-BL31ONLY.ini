# RK3399 trust container: BL31 only (no BL32 / OP-TEE).
# Use with Rockchip trust_merger + TF-A bl31.elf copied to bin/rk33/rk3399_bl31_v1.36.elf.
# Matches Armbian-style SPL expectations on NanoPi M4 SD; see docs/rk3399/firmware-handoff-debug.md

[VERSION]
MAJOR=1
MINOR=0
[BL30_OPTION]
SEC=0
[BL31_OPTION]
SEC=1
PATH=bin/rk33/rk3399_bl31_v1.36.elf
ADDR=0x00040000
[BL32_OPTION]
SEC=0
[BL33_OPTION]
SEC=0
[OUTPUT]
PATH=trust.img
