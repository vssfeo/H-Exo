# RK3399 trust container: BL31 only, packed from a raw BL31 binary.
# Experimental profile for old Boot1/SPL builds that may reject multi-PT_LOAD ELF component hashing.

[VERSION]
MAJOR=1
MINOR=0
[BL30_OPTION]
SEC=0
[BL31_OPTION]
SEC=1
PATH=bin/rk33/rk3399_bl31_v1.36.bin
ADDR=0x00040000
[BL32_OPTION]
SEC=0
[BL33_OPTION]
SEC=0
[OUTPUT]
PATH=trust.img
