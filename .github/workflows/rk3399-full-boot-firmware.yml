# Full boot firmware for RK3399 NanoPi M4 — SPL+TPL flow (NO miniloader).
# BootROM → TPL (DDR init) → SPL → BL31 → U-Boot proper.
# All latest versions: U-Boot 2026.04, TF-A v2.14, rkbin DDR v1.30.
#
# Output artifacts:
#   idbloader.img  — TPL+SPL, flash at LBA 0x40 (sector 64)
#   u-boot.itb     — FIT: U-Boot + BL31 + DTB, flash at LBA 0x4000
#   boot-firmware.img — Armbian image with boot firmware replaced
name: RK3399 Full Boot Firmware (SPL+TPL)

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      tfa_tag:
        description: TrustedFirmware-A git tag
        required: true
        default: v2.14.0
      uboot_repo:
        description: U-Boot git repo
        required: true
        default: https://github.com/u-boot/u-boot.git
      uboot_branch:
        description: U-Boot branch or tag
        required: true
        default: v2026.04
      ddr_mhz:
        description: DDR frequency (666/800/933)
        required: true
        default: "800"
        type: choice
        options:
          - "666"
          - "800"
          - "933"
  push:
    branches: [master, main]
    paths:
      - ".github/workflows/rk3399-full-boot-firmware.yml"
      - "patches/tf-a-v2.14-rk3399-pmusram-rsize-16k.patch"

permissions:
  contents: read

concurrency:
  group: rk3399-full-boot-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Resolve inputs
        id: opts
        run: |
          TFA="${{ github.event.inputs.tfa_tag }}"
          [ -z "$TFA" ] && TFA="v2.14.0"
          UB_REPO="${{ github.event.inputs.uboot_repo }}"
          [ -z "$UB_REPO" ] && UB_REPO="https://github.com/u-boot/u-boot.git"
          UB_BRANCH="${{ github.event.inputs.uboot_branch }}"
          [ -z "$UB_BRANCH" ] && UB_BRANCH="v2026.04"
          DDR="${{ github.event.inputs.ddr_mhz }}"
          [ -z "$DDR" ] && DDR="800"
          echo "tfa_tag=$TFA" >> "$GITHUB_OUTPUT"
          echo "ub_repo=$UB_REPO" >> "$GITHUB_OUTPUT"
          echo "ub_branch=$UB_BRANCH" >> "$GITHUB_OUTPUT"
          echo "ddr_mhz=$DDR" >> "$GITHUB_OUTPUT"

      - name: Install toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            make git python3 device-tree-compiler bc gcc libc6-dev \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            gcc-arm-none-eabi binutils-arm-none-eabi \
            libgnutls28-dev \
            bison flex swig python3-dev python3-setuptools \
            python3-pyelftools

      # ── TF-A BL31 ──────────────────────────────────────────────
      - name: Clone Trusted Firmware-A
        run: |
          git clone --depth 1 --branch "${{ steps.opts.outputs.tfa_tag }}" \
            https://github.com/TrustedFirmware-A/trusted-firmware-a.git \
            "${{ runner.temp }}/tfa"

      - name: Enlarge PMUSRAM_RSIZE for BL31 link (8 KiB -> 16 KiB)
        run: |
          F="${{ runner.temp }}/tfa/plat/rockchip/rk3399/include/shared/addressmap_shared.h"
          grep -n PMUSRAM_RSIZE "$F"
          sed -i '/PMUSRAM_RSIZE/s/SIZE_K(8)/SIZE_K(16)/' "$F"
          grep -n PMUSRAM_RSIZE "$F"

      - name: Build BL31
        working-directory: ${{ runner.temp }}/tfa
        run: |
          make -j"$(nproc)" \
            CROSS_COMPILE=aarch64-linux-gnu- \
            PLAT=rk3399 \
            DEBUG=0 \
            LOG_LEVEL=20 \
            ENABLE_ASSERTIONS=0 \
            RK3399_BAUDRATE=1500000 \
            bl31
          BL31=$(find build -path '*/bl31/bl31.elf' -type f | head -1)
          test -s "$BL31"
          echo "BL31=$BL31" >> "$GITHUB_ENV"
          ls -la "$BL31"
          cp "$BL31" "${{ runner.temp }}/bl31.elf"

      # ── rkbin (DDR blob) ────────────────────────────────────────
      - name: Clone rkbin for DDR blob
        id: rkbin
        run: |
          git clone --depth 1 https://github.com/rockchip-linux/rkbin.git "${{ runner.temp }}/rkbin"
          DDR_MHZ="${{ steps.opts.outputs.ddr_mhz }}"
          # Try exact name first, then fallback to any matching ddr blob
          DDR_BIN=$(find "${{ runner.temp }}/rkbin/bin/rk33" \
            -name "rk3399_ddr_${DDR_MHZ}MHz_*.bin" -type f | head -1)
          if [ -z "$DDR_BIN" ]; then
            echo "Available RK3399 DDR blobs:"
            ls "${{ runner.temp }}/rkbin/bin/rk33/" | grep 'rk3399_ddr' || true
            echo "::error::No DDR blob matching rk3399_ddr_${DDR_MHz}MHz_*.bin"
            exit 1
          fi
          echo "DDR blob: $DDR_BIN ($(stat -c%s "$DDR_BIN") bytes)"
          echo "ddr_bin_orig=$DDR_BIN" >> "$GITHUB_OUTPUT"

      - name: Patch DDR blob for DDR3-only (NanoPi M4 has DDR3L, not LPDDR3)
        id: ddr_patch
        run: |
          DDR_BIN="${{ steps.rkbin.outputs.ddr_bin_orig }}"
          DDR_PATCHED="${{ runner.temp }}/rk3399_ddr_ddr3only.bin"
          cp "$DDR_BIN" "$DDR_PATCHED"
          # ddrbin_tool cannot change DDR freq for RK3399 (marked X in compat table).
          # Binary-patch the lp3_freq field directly:
          # Tag 0x12345678 is at some offset; at tag+0x10 the 32-bit word encodes
          #   lp3_freq[11:0] | ddr3_freq[27:16]  (both in MHz, e.g. 800=0x320)
          # Zero lp3_freq so TPL skips LPDDR3 and uses DDR3 only.
          python3 -c "
          import struct
          blob = bytearray(open('$DDR_PATCHED','rb').read())
          tag = struct.pack('<I', 0x12345678)
          pos = blob.find(tag)
          assert pos >= 0, 'DDR param tag not found'
          off = pos + 0x10
          val = struct.unpack_from('<I', blob, off)[0]
          print(f'Before: ddr3={(val>>16)&0xfff}, lp3={val&0xfff}')
          new_val = (val & 0xFFFF0000) | 0   # lp3_freq = 0
          struct.pack_into('<I', blob, off, new_val)
          val2 = struct.unpack_from('<I', blob, off)[0]
          print(f'After:  ddr3={(val2>>16)&0xfff}, lp3={val2&0xfff}')
          open('$DDR_PATCHED','wb').write(blob)
          "
          echo "Patched DDR blob: $DDR_PATCHED ($(stat -c%s "$DDR_PATCHED") bytes)"
          echo "ddr_bin=$DDR_PATCHED" >> "$GITHUB_OUTPUT"

      # ── U-Boot (SPL+TPL) ───────────────────────────────────────
      - name: Clone U-Boot
        run: |
          git clone --depth 1 --branch "${{ steps.opts.outputs.ub_branch }}" \
            "${{ steps.opts.outputs.ub_repo }}" \
            "${{ runner.temp }}/u-boot"

      - name: Patch U-Boot DT for DDR3L (NanoPi M4 uses DDR3L, not LPDDR3)
        working-directory: ${{ runner.temp }}/u-boot
        run: |
          # The nanopi-m4-u-boot.dtsi includes LPDDR3 timing params.
          # NanoPi M4 has DDR3L memory. Replace with DDR3-1600 (800MHz).
          DTSI="arch/arm/dts/rk3399-nanopi-m4-u-boot.dtsi"
          echo "=== Before patch ==="
          cat "$DTSI"
          sed -i 's|rk3399-sdram-lpddr3-samsung-4GB-1866|rk3399-sdram-ddr3-1600|' "$DTSI"
          echo "=== After patch ==="
          cat "$DTSI"

      - name: Build U-Boot with SPL+TPL for NanoPi M4
        working-directory: ${{ runner.temp }}/u-boot
        run: |
          DDR_BIN="${{ steps.ddr_patch.outputs.ddr_bin }}"

          make nanopi-m4-rk3399_defconfig
          make -j"$(nproc)" \
            CROSS_COMPILE=aarch64-linux-gnu- \
            ROCKCHIP_TPL="$DDR_BIN" \
            BL31="${{ runner.temp }}/bl31.elf"

          # Verify outputs
          for f in idbloader.img u-boot.itb; do
            if [ ! -s "$f" ]; then
              echo "::error::$f not produced"
              find . -name "$f" -o -name "u-boot-rockchip*" 2>/dev/null | head -10
              exit 1
            fi
            ls -la "$f"
          done

      # ── Package artifacts ───────────────────────────────────────
      - name: Package artifacts
        run: |
          mkdir -p "${{ github.workspace }}/artifacts"
          cp "${{ runner.temp }}/u-boot/idbloader.img" "${{ github.workspace }}/artifacts/"
          cp "${{ runner.temp }}/u-boot/u-boot.itb" "${{ github.workspace }}/artifacts/"
          cp "${{ runner.temp }}/bl31.elf" "${{ github.workspace }}/artifacts/"

          # Also copy the DDR blob used for reference
          DDR_MHZ="${{ steps.opts.outputs.ddr_mhz }}"
          cp "${{ steps.ddr_patch.outputs.ddr_bin }}" \
            "${{ github.workspace }}/artifacts/rk3399_ddr_${DDR_MHZ}MHz_ddr3only.bin"

          ( cd "${{ github.workspace }}/artifacts" && sha256sum * > SHA256SUMS )

          {
            echo "RK3399 NanoPi M4 — Full Boot Firmware (SPL+TPL flow)"
            echo "===================================================="
            echo "TF-A: ${{ steps.opts.outputs.tfa_tag }}"
            echo "U-Boot: ${{ steps.opts.outputs.ub_branch }}"
            echo "DDR: ${DDR_MHZ}MHz (rkbin v1.30)"
            echo "Built (UTC): $(date -u -Iseconds)"
            echo ""
            echo "Boot flow: BootROM → TPL (DDR) → SPL → BL31 → U-Boot"
            echo "NO miniloader/Boot1 — pure mainline SPL+TPL"
            echo ""
            echo "Files:"
            echo "  idbloader.img  — TPL+SPL, flash at LBA 0x40 (sector 64)"
            echo "  u-boot.itb     — FIT: U-Boot + BL31 + DTB, flash at LBA 0x4000"
            echo "  bl31.elf       — TF-A BL31 (reference)"
            echo "  rk3399_ddr_*.bin — DDR init blob (reference)"
            echo ""
            echo "Flash to Armbian SD image (PowerShell):"
            echo '  $img = "C:\tftpboot\Armbian_...img"'
            echo '  $s = [IO.File]::Open($img, "Open", "Write", "None")'
            echo '  $idb = [IO.File]::ReadAllBytes("idbloader.img")'
            echo '  $itb = [IO.File]::ReadAllBytes("u-boot.itb")'
            echo '  $s.Seek(0x40*512, 0) | Out-Null; $s.Write($idb, 0, $idb.Length)'
            echo '  $s.Seek(0x4000*512, 0) | Out-Null; $s.Write($itb, 0, $itb.Length)'
            echo '  $s.Flush(); $s.Dispose()'
            echo ""
            echo "Or use patch_etcher_image.ps1 with -IdbLoader and -UBootItb params"
          } > "${{ github.workspace }}/artifacts/README_FLASH.txt"

      - uses: actions/upload-artifact@v4
        with:
          name: rk3399-full-boot-${{ steps.opts.outputs.tfa_tag }}-ub${{ steps.opts.outputs.ub_branch }}-ddr${{ steps.opts.outputs.ddr_mhz }}
          path: artifacts/
          if-no-files-found: error
