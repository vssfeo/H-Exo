# Full boot firmware for RK3399 NanoPi M4 — SPL+TPL flow (NO miniloader).
# BootROM → TPL (DDR init) → SPL → BL31 → U-Boot proper.
# All latest versions: U-Boot 2026.04, TF-A v2.14, rkbin DDR v1.30.
#
# Output artifacts:
#   idbloader.img  — TPL+SPL, flash at LBA 0x40 (sector 64)
#   u-boot.itb     — FIT: U-Boot + BL31 + DTB, flash at LBA 0x4000
#   boot-firmware.img — Armbian image with boot firmware replaced
name: RK3399 Full Boot Firmware (SPL+TPL)

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      tfa_tag:
        description: TrustedFirmware-A git tag
        required: true
        default: v2.14.0
      uboot_repo:
        description: U-Boot git repo
        required: true
        default: https://github.com/u-boot/u-boot.git
      uboot_branch:
        description: U-Boot branch or tag
        required: true
        default: v2026.04
      ddr_mhz:
        description: DDR frequency (666/800/933)
        required: true
        default: "800"
        type: choice
        options:
          - "666"
          - "800"
          - "933"
  push:
    branches: [master, main]
    paths:
      - ".github/workflows/rk3399-full-boot-firmware.yml"
      - "docs/rk3399-full-boot-firmware.yml"
      - "docs/rk3399-nanopi-m4-boot-firmware.md"
      - "docs/tfa_gicr_waker_sip_patch.md"
      - "patches/tf-a-v2.14-rk3399-pmusram-rsize-16k.patch"
      - "patches/trusted-firmware-a-v2.14-rk3399-sip-gicr-waker.patch"

permissions:
  contents: read

concurrency:
  group: rk3399-full-boot-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Resolve inputs
        id: opts
        run: |
          TFA="${{ github.event.inputs.tfa_tag }}"
          [ -z "$TFA" ] && TFA="v2.14.0"
          UB_REPO="${{ github.event.inputs.uboot_repo }}"
          [ -z "$UB_REPO" ] && UB_REPO="https://github.com/u-boot/u-boot.git"
          UB_BRANCH="${{ github.event.inputs.uboot_branch }}"
          [ -z "$UB_BRANCH" ] && UB_BRANCH="v2026.04"
          DDR="${{ github.event.inputs.ddr_mhz }}"
          [ -z "$DDR" ] && DDR="800"
          echo "tfa_tag=$TFA" >> "$GITHUB_OUTPUT"
          echo "ub_repo=$UB_REPO" >> "$GITHUB_OUTPUT"
          echo "ub_branch=$UB_BRANCH" >> "$GITHUB_OUTPUT"
          echo "ddr_mhz=$DDR" >> "$GITHUB_OUTPUT"

      - name: Install toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            make git python3 device-tree-compiler bc gcc libc6-dev \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            gcc-arm-none-eabi binutils-arm-none-eabi \
            libgnutls28-dev \
            bison flex swig python3-dev python3-setuptools \
            python3-pyelftools

      # ── TF-A BL31 ──────────────────────────────────────────────
      - name: Clone Trusted Firmware-A
        run: |
          git clone --depth 1 --branch "${{ steps.opts.outputs.tfa_tag }}" \
            https://github.com/TrustedFirmware-A/trusted-firmware-a.git \
            "${{ runner.temp }}/tfa"

      - name: Enlarge PMUSRAM_RSIZE for BL31 link (8 KiB -> 16 KiB)
        run: |
          F="${{ runner.temp }}/tfa/plat/rockchip/rk3399/include/shared/addressmap_shared.h"
          grep -n PMUSRAM_RSIZE "$F"
          sed -i '/PMUSRAM_RSIZE/s/SIZE_K(8)/SIZE_K(16)/' "$F"
          grep -n PMUSRAM_RSIZE "$F"

      # Keep CPU debug power domain alive so PMCCNTR_EL0 / PMU event counters
      # tick when read from non-secure EL2/EL1. See patch header for details.
      - name: Apply PMU keep-debug-powered patch
        working-directory: ${{ runner.temp }}/tfa
        run: |
          F="plat/rockchip/rk3399/drivers/pmu/pmu.c"
          if grep -q DBG_NOPWERDWN_L0_EN "$F"; then
            echo "PMU debug-power patch already present"
          else
            awk '
              /^void plat_rockchip_pmu_init/ { in_fn = 1 }
              { print }
              in_fn && /init_pmu_counts\(\);/ {
                print ""
                print "\t/*"
                print "\t * Keep per-core debug power domain alive so PMCCNTR_EL0"
                print "\t * and PMU event counters keep ticking for non-secure EL2/EL1 reads."
                print "\t */"
                print "\tmmio_setbits_32(PMU_BASE + PMU_SFT_CON,"
                print "\t\t\tBIT(DBG_NOPWERDWN_L0_EN) |"
                print "\t\t\tBIT(DBG_NOPWERDWN_L1_EN) |"
                print "\t\t\tBIT(DBG_NOPWERDWN_L2_EN) |"
                print "\t\t\tBIT(DBG_NOPWERDWN_L3_EN) |"
                print "\t\t\tBIT(DBG_NO_PWERDWN_B0_EN) |"
                print "\t\t\tBIT(DBG_NO_PWERDWN_B1_EN));"
                in_fn = 0
              }
            ' "$F" > "${F}.new"
            mv "${F}.new" "$F"
          fi
          grep -n DBG_NOPWERDWN_L0_EN plat/rockchip/rk3399/drivers/pmu/pmu.c

      - name: Patch RK3399 SiP H-Exo diagnostic calls
        working-directory: ${{ runner.temp }}/tfa
        run: |
          cat > /tmp/h_exo_patch_sip.py <<'PY'
          from pathlib import Path
          import textwrap

          p = Path("plat/rockchip/rk3399/plat_sip_calls.c")
          if not p.exists():
              raise SystemExit(f"missing {p}")

          s = p.read_text()
          marker = "H_EXO_SIP_FW_INFO"
          if marker in s:
              print("H-Exo SiP patch already present")
              raise SystemExit(0)

          helper = textwrap.dedent(r'''

          #define RK_SIP_SMPEN_GET            U(0x82000099)
          #define RK_SIP_SMPEN_SET            U(0x8200009A)
          #define RK_SIP_SMPEN_GET_64         U(0xC2000099)
          #define RK_SIP_SMPEN_SET_64         U(0xC200009A)
          #define H_EXO_SIP_FW_INFO           U(0xC20000A0)
          #define H_EXO_SIP_CPU_DIAG          U(0xC20000A1)
          #define H_EXO_FW_MAGIC              0x4845584F524B3339ULL
          #define H_EXO_FW_VERSION            0x0000000000000001ULL
          #define A72_CPUECTLR_SMP_BIT        (1ULL << 6)

          static uint64_t rk_smpen_get(void)
          {
          	uint64_t v;
          	__asm__ volatile ("mrs %0, S3_1_C15_C2_1" : "=r"(v));
          	return (v & A72_CPUECTLR_SMP_BIT) ? 1ULL : 0ULL;
          }

          static uint64_t rk_smpen_set(void)
          {
          	uint64_t v;
          	__asm__ volatile ("mrs %0, S3_1_C15_C2_1" : "=r"(v));
          	if ((v & A72_CPUECTLR_SMP_BIT) == 0ULL) {
          		v |= A72_CPUECTLR_SMP_BIT;
          		__asm__ volatile ("msr S3_1_C15_C2_1, %0\n\tisb" :: "r"(v));
          	}
          	return rk_smpen_get();
          }

          static uint64_t h_exo_read_mpidr(void)
          {
          	uint64_t v;
          	__asm__ volatile ("mrs %0, mpidr_el1" : "=r"(v));
          	return v;
          }

          static uint64_t h_exo_read_midr(void)
          {
          	uint64_t v;
          	__asm__ volatile ("mrs %0, midr_el1" : "=r"(v));
          	return v;
          }

          static uint64_t h_exo_read_currentel(void)
          {
          	uint64_t v;
          	__asm__ volatile ("mrs %0, CurrentEL" : "=r"(v));
          	return v;
          }
          ''')

          anchor = "uint64_t sip_smc_dram("
          if anchor in s:
              s = s.replace(anchor, helper + "\n" + anchor, 1)
          else:
              include_pos = s.rfind("#include")
              if include_pos < 0:
                  raise SystemExit("cannot find include/helper insertion point")
              line_end = s.find("\n", include_pos)
              s = s[:line_end + 1] + helper + s[line_end + 1:]

          cases = textwrap.dedent(r'''
          	case RK_SIP_SMPEN_GET:
          	case RK_SIP_SMPEN_GET_64:
          		SMC_RET1(handle, rk_smpen_get());
          	case RK_SIP_SMPEN_SET:
          	case RK_SIP_SMPEN_SET_64:
          		SMC_RET1(handle, rk_smpen_set());
          	case H_EXO_SIP_FW_INFO:
          		SMC_RET2(handle, H_EXO_FW_MAGIC, H_EXO_FW_VERSION);
          	case H_EXO_SIP_CPU_DIAG:
          		SMC_RET4(handle, h_exo_read_mpidr(), h_exo_read_midr(),
          			 h_exo_read_currentel(), rk_smpen_get());
          ''')

          switch_anchor = "switch (smc_fid) {"
          if switch_anchor not in s:
              raise SystemExit("cannot find SiP switch (smc_fid)")
          s = s.replace(switch_anchor, switch_anchor + cases, 1)

          p.write_text(s)
          print("H-Exo SiP patch applied")
          print("---- relevant grep ----")
          for i, line in enumerate(s.splitlines(), 1):
              if "RK_SIP_SMPEN" in line or "H_EXO_SIP" in line or "rk_smpen_" in line:
                  print(f"{i}: {line}")
          PY
          python3 /tmp/h_exo_patch_sip.py

      - name: Patch RK3399 SiP GICR WAKER diagnostic calls
        working-directory: ${{ runner.temp }}/tfa
        run: |
          cat > /tmp/h_exo_patch_gicr_sip.py <<'PY'
          from pathlib import Path
          import textwrap

          p = Path("plat/rockchip/rk3399/plat_sip_calls.c")
          if not p.exists():
              raise SystemExit(f"missing {p}")

          s = p.read_text()
          marker = "RK_SIP_GICR_WAKER_GET"
          if marker in s:
              print("H-Exo GICR SiP patch already present")
              raise SystemExit(0)

          helper = textwrap.dedent(r'''

          #define RK_SIP_GICR_WAKER_GET      U(0x820000A2)
          #define RK_SIP_GICR_WAKE_TRY       U(0x820000A3)
          #define RK_SIP_GICR_WAKER_GET_64   U(0xC20000A2)
          #define RK_SIP_GICR_WAKE_TRY_64    U(0xC20000A3)

          #define RK3399_GICR_BASE_PHYS      ULL(0xFEF00000)
          #define RK3399_GICR_STRIDE         ULL(0x20000)
          #define RK3399_GICR_WAKER_OFF      ULL(0x14)
          #define RK3399_CORE_COUNT          U(6)
          #define RK_GICR_WAKER_PS           U(2)   /* bit 1: ProcessorSleep */
          #define RK_GICR_WAKER_CA           U(4)   /* bit 2: ChildrenAsleep */

          #define RK_GICR_WAKE_OK            U(0)
          #define RK_GICR_WAKE_ERR_CORE      U(1)
          #define RK_GICR_WAKE_ERR_TIMEOUT   U(2)
          #define RK_GICR_WAKE_ERR_WRITE_IGN U(4)

          static uintptr_t rk3399_gicr_waker_addr(uint64_t core)
          {
          	if (core >= RK3399_CORE_COUNT) {
          		return (uintptr_t)0;
          	}

          	return (uintptr_t)(RK3399_GICR_BASE_PHYS +
          			(core * RK3399_GICR_STRIDE) +
          			RK3399_GICR_WAKER_OFF);
          }

          static uint32_t rk3399_gicr_waker_read(uint64_t core, uint32_t *status)
          {
          	uintptr_t a = rk3399_gicr_waker_addr(core);

          	if (a == 0U) {
          		if (status != NULL) {
          			*status = RK_GICR_WAKE_ERR_CORE;
          		}
          		return 0U;
          	}

          	if (status != NULL) {
          		*status = RK_GICR_WAKE_OK;
          	}
          	return *((volatile uint32_t *)a);
          }

          static uint64_t rk3399_gicr_wake_try(uint64_t core, uint32_t *before,
          					      uint32_t *after)
          {
          	uintptr_t a = rk3399_gicr_waker_addr(core);
          	uint32_t v, vr, st = RK_GICR_WAKE_OK;
          	int i;

          	if (a == 0U) {
          		if (before != NULL) {
          			*before = 0U;
          		}
          		if (after != NULL) {
          			*after = 0U;
          		}
          		return RK_GICR_WAKE_ERR_CORE;
          	}

          	v = *((volatile uint32_t *)a);
          	if (before != NULL) {
          		*before = v;
          	}

          	/* Phase A: force ProcessorSleep=1 and wait for ChildrenAsleep=1 */
          	v |= RK_GICR_WAKER_PS;
          	*((volatile uint32_t *)a) = v;
          	vr = *((volatile uint32_t *)a);
          	if ((vr & RK_GICR_WAKER_PS) == 0U) {
          		st |= RK_GICR_WAKE_ERR_WRITE_IGN;
          	}

          	for (i = 0; i < 10000; i++) {
          		vr = *((volatile uint32_t *)a);
          		if ((vr & RK_GICR_WAKER_CA) != 0U) {
          			break;
          		}
          	}
          	if (i == 10000) {
          		st |= RK_GICR_WAKE_ERR_TIMEOUT;
          	}

          	/* Phase B: clear ProcessorSleep and wait for ChildrenAsleep=0 */
          	v = vr & ~RK_GICR_WAKER_PS;
          	*((volatile uint32_t *)a) = v;
          	vr = *((volatile uint32_t *)a);
          	if ((vr & RK_GICR_WAKER_PS) != 0U) {
          		st |= RK_GICR_WAKE_ERR_WRITE_IGN;
          	}

          	for (i = 0; i < 10000; i++) {
          		vr = *((volatile uint32_t *)a);
          		if ((vr & RK_GICR_WAKER_CA) == 0U) {
          			break;
          		}
          	}
          	if (i == 10000) {
          		st |= RK_GICR_WAKE_ERR_TIMEOUT;
          	}

          	if (after != NULL) {
          		*after = vr;
          	}
          	return st;
          }
          ''')

          anchor = "uint64_t sip_smc_dram("
          if anchor in s:
              s = s.replace(anchor, helper + "\n" + anchor, 1)
          else:
              include_pos = s.rfind("#include")
              if include_pos < 0:
                  raise SystemExit("cannot find include/helper insertion point")
              line_end = s.find("\n", include_pos)
              s = s[:line_end + 1] + helper + s[line_end + 1:]

          cases = textwrap.dedent(r'''
          	case RK_SIP_GICR_WAKER_GET:
          	case RK_SIP_GICR_WAKER_GET_64: {
          		uint32_t st;
          		uint32_t w = rk3399_gicr_waker_read(x1, &st);
          		SMC_RET2(handle, st, w);
          	}
          	case RK_SIP_GICR_WAKE_TRY:
          	case RK_SIP_GICR_WAKE_TRY_64: {
          		uint32_t b = 0U, a = 0U;
          		uint64_t st = rk3399_gicr_wake_try(x1, &b, &a);
          		SMC_RET3(handle, st, b, a);
          	}
          ''')

          switch_anchor = "switch (smc_fid) {"
          if switch_anchor not in s:
              raise SystemExit("cannot find SiP switch (smc_fid)")
          s = s.replace(switch_anchor, switch_anchor + cases, 1)

          p.write_text(s)
          print("H-Exo GICR SiP patch applied")
          print("---- relevant grep ----")
          for i, line in enumerate(s.splitlines(), 1):
              if "RK_SIP_GICR_" in line or "rk3399_gicr_wake" in line or "GICR_WAKER" in line:
                  print(f"{i}: {line}")
          PY
          python3 /tmp/h_exo_patch_gicr_sip.py

      - name: Build BL31
        working-directory: ${{ runner.temp }}/tfa
        run: |
          make -j"$(nproc)" \
            CROSS_COMPILE=aarch64-linux-gnu- \
            PLAT=rk3399 \
            DEBUG=0 \
            LOG_LEVEL=20 \
            ENABLE_ASSERTIONS=0 \
            RK3399_BAUDRATE=1500000 \
            bl31
          BL31=$(find build -path '*/bl31/bl31.elf' -type f | head -1)
          test -s "$BL31"
          echo "BL31=$BL31" >> "$GITHUB_ENV"
          ls -la "$BL31"
          cp "$BL31" "${{ runner.temp }}/bl31.elf"

      # ── U-Boot (SPL+TPL) ───────────────────────────────────────
      # NOTE: No DDR blob needed — TPL is compiled from source with DDR3 DT params.
      - name: Clone U-Boot
        run: |
          git clone --depth 1 --branch "${{ steps.opts.outputs.ub_branch }}" \
            "${{ steps.opts.outputs.ub_repo }}" \
            "${{ runner.temp }}/u-boot"

      - name: Patch U-Boot DT for DDR3L (NanoPi M4 uses DDR3L, not LPDDR3)
        working-directory: ${{ runner.temp }}/u-boot
        run: |
          # The nanopi-m4-u-boot.dtsi includes LPDDR3 timing params.
          # NanoPi M4 has DDR3L memory. Replace with DDR3-1600 (800MHz).
          DTSI="arch/arm/dts/rk3399-nanopi-m4-u-boot.dtsi"
          echo "=== Before patch ==="
          cat "$DTSI"
          sed -i 's|rk3399-sdram-lpddr3-samsung-4GB-1866|rk3399-sdram-ddr3-1600|' "$DTSI"
          echo "=== After patch ==="
          cat "$DTSI"

      - name: Add SYR827 + RK808 PMIC regulators to U-Boot DT
        working-directory: ${{ runner.temp }}/u-boot
        run: |
          DTSI="arch/arm/dts/rk3399-nanopi4.dtsi"
          python3 - <<'PY'
          from pathlib import Path
          p = Path("arch/arm/dts/rk3399-nanopi4.dtsi")
          s = p.read_text()
          block = '''
          &i2c0 {
                  clock-frequency = <400000>;
                  status = "okay";

                  rk808@1b {
                          compatible = "rockchip,rk808";
                          reg = <0x1b>;
                          #clock-cells = <1>;
                          clock-output-names = "xin32k", "rk808-clkout2";
                          interrupt-parent = <&gpio1>;
                          interrupts = <21 8>;
                          pinctrl-names = "default";
                          pinctrl-0 = <&pmic_int_l>;
                          rockchip,system-power-controller;
                          wakeup-source;

                          vdd_cpu_l: rk808-dcdc1 {
                                  regulator-name = "vdd_cpu_l";
                                  regulator-always-on;
                                  regulator-boot-on;
                                  regulator-min-microvolt = <750000>;
                                  regulator-max-microvolt = <1350000>;
                          };

                          vcc1v8_dvp: rk808-ldo1 {
                                  regulator-name = "vcc1v8_dvp";
                          };

                          vcc3v0_touch: rk808-ldo2 {
                                  regulator-name = "vcc3v0_touch";
                          };

                          vcc1v8_pmupll: rk808-ldo3 {
                                  regulator-name = "vcc1v8_pmupll";
                          };

                          vcc_sd: rk808-ldo4 {
                                  regulator-name = "vcc_sd";
                                  regulator-min-microvolt = <3300000>;
                                  regulator-max-microvolt = <3300000>;
                          };

                          vcc5v0_usb: rk808-ldo5 {
                                  regulator-name = "vcc5v0_usb";
                          };

                          vcc1v8_codec: rk808-ldo6 {
                                  regulator-name = "vcc1v8_codec";
                          };

                          vcc_1v8: rk808-ldo7 {
                                  regulator-name = "vcc_1v8";
                          };

                          vcc_3v0: rk808-ldo8 {
                                  regulator-name = "vcc_3v0";
                          };

                          vcca_1v8: rk808-dcdc2 {
                                  regulator-name = "vcca_1v8";
                          };

                          vcc_sdio: rk808-dcdc3 {
                                  regulator-name = "vcc_sdio";
                          };

                          vcc5v0_host: rk808-dcdc4 {
                                  regulator-name = "vcc5v0_host";
                          };
                  };

                  vdd_cpu_b: syr827@40 {
                          compatible = "silergy,syr827";
                          reg = <0x40>;
                          fcs,suspend-voltage-selector = <1>;
                          regulator-name = "vdd_cpu_b";
                          regulator-min-microvolt = <712500>;
                          regulator-max-microvolt = <1500000>;
                          regulator-always-on;
                          regulator-boot-on;
                  };
          };
          '''
          if "silergy,syr827" not in s:
              p.write_text(s.rstrip() + "\\n" + block)
          PY
          grep -n -A4 'rk808@1b' "$DTSI" || echo "WARN: rk808 node not found"
          grep -n -A4 'syr827@40' "$DTSI"

      - name: Add CPU-supply bindings + IO domains to U-Boot DT
        working-directory: ${{ runner.temp }}/u-boot
        run: |
          DTS="arch/arm/dts/rk3399-nanopi4.dtsi"
          python3 - <<'PY'
          from pathlib import Path
          p = Path("arch/arm/dts/rk3399-nanopi4.dtsi")
          s = p.read_text()
          # CPU-supply bindings — tells U-Boot which regulator feeds each cluster
          bindings = '''
          &cpu_b0 { cpu-supply = <&vdd_cpu_b>; };
          &cpu_b1 { cpu-supply = <&vdd_cpu_b>; };
          &cpu_l0 { cpu-supply = <&vdd_cpu_l>; };
          &cpu_l1 { cpu-supply = <&vdd_cpu_l>; };
          &cpu_l2 { cpu-supply = <&vdd_cpu_l>; };
          &cpu_l3 { cpu-supply = <&vdd_cpu_l>; };
          '''
          if "cpu-supply" not in s:
              p.write_text(s.rstrip() + "\\n" + bindings)

          # IO domains — required for correct I2C0 voltage levels
          s = p.read_text()
          iodom = '''
          &io_domains {
                  status = "okay";
                  bt656-supply = <&vcc1v8_dvp>;
                  audio-supply = <&vcc1v8_dvp>;
                  sdmmc-supply = <&vcc_sd>;
                  gpio1830-supply = <&vcc_3v0>;
          };
          '''
          if "io_domains" not in s:
              p.write_text(s.rstrip() + "\\n" + iodom)
          PY
          grep -n 'cpu-supply' "$DTS" || echo "WARN: cpu-supply not found"
          grep -n 'io_domains' "$DTS" || echo "WARN: io_domains not found"

      - name: Build U-Boot with SPL+TPL for NanoPi M4
        working-directory: ${{ runner.temp }}/u-boot
        run: |
          make nanopi-m4-rk3399_defconfig
          # Disable SPL FIT hash verification — binman split-elf creates
          # atf-3 (PMUSRAM seg) with mismatched sha256. Safe for dev boards.
          scripts/config --disable SPL_FIT_SIGNATURE
          # I2C + regulator commands (SYR827 VDD_CPU_B for A72)
          scripts/config --enable CMD_I2C
          scripts/config --enable CMD_REGULATOR
          scripts/config --enable DM_REGULATOR
          scripts/config --enable DM_PMIC_FAN53555
          scripts/config --enable DM_REGULATOR_FAN53555
          # RK808 PMIC driver (VDD_CPU_L for A53 cluster) — already in defconfig
          # but ensure regulator commands can reach it
          scripts/config --enable DM_PMIC_RK8XX
          scripts/config --enable DM_REGULATOR_RK8XX
          # CMD_CLK — allows setting CPU frequencies from U-Boot before kernel
          scripts/config --enable CMD_CLK
          # Deep network/bring-up diagnostics and service functions
          scripts/config --enable CMD_MII
          scripts/config --enable CMD_MDIO
          scripts/config --enable PHY_GIGE
          scripts/config --enable CMD_PCAP
          scripts/config --enable NETCONSOLE
          scripts/config --enable CMD_SNTP
          scripts/config --enable BOOTP_NTPSERVER
          scripts/config --enable CMD_TFTPPUT
          scripts/config --enable CMD_TFTPSRV
          scripts/config --enable NET_TFTP_VARS
          scripts/config --set-val TFTP_WINDOWSIZE 16
          scripts/config --enable CMD_WDT
          scripts/config --enable CMD_CONFIG
          # PREBOOT: raise BOTH voltages before kernel starts
          #   VDD_CPU_B = 1.2V  → A72 stable at 1608 MHz
          #   VDD_CPU_L = 1.0V  → A53 stable at 1200 MHz (was stuck at 504 MHz)
          scripts/config --enable USE_PREBOOT
          scripts/config --set-str PREBOOT 'regulator dev vdd_cpu_b; regulator value 1200000 -f; regulator dev vdd_cpu_l; regulator value 1000000 -f'
          make olddefconfig
          grep -E 'CONFIG_(CMD_I2C|CMD_REGULATOR|DM_REGULATOR|DM_PMIC_FAN53555|DM_REGULATOR_FAN53555|DM_PMIC_RK8XX|DM_REGULATOR_RK8XX|CMD_CLK|CMD_MII|CMD_MDIO|PHY_GIGE|CMD_PCAP|NETCONSOLE|CMD_SNTP|BOOTP_NTPSERVER|CMD_TFTPPUT|CMD_TFTPSRV|NET_TFTP_VARS|CMD_WDT|CMD_CONFIG|PREBOOT)' .config
          make -j"$(nproc)" \
            CROSS_COMPILE=aarch64-linux-gnu- \
            BL31="${{ runner.temp }}/bl31.elf"

          # Verify outputs
          for f in idbloader.img u-boot.itb; do
            if [ ! -s "$f" ]; then
              echo "::error::$f not produced"
              find . -name "$f" -o -name "u-boot-rockchip*" 2>/dev/null | head -10
              exit 1
            fi
            ls -la "$f"
          done

      # ── Package artifacts ───────────────────────────────────────
      - name: Package artifacts
        run: |
          mkdir -p "${{ github.workspace }}/artifacts"
          cp "${{ runner.temp }}/u-boot/idbloader.img" "${{ github.workspace }}/artifacts/"
          cp "${{ runner.temp }}/u-boot/u-boot.itb" "${{ github.workspace }}/artifacts/"
          cp "${{ runner.temp }}/bl31.elf" "${{ github.workspace }}/artifacts/"

          ( cd "${{ github.workspace }}/artifacts" && sha256sum * > SHA256SUMS )

          {
            echo "RK3399 NanoPi M4 — Full Boot Firmware (SPL+TPL flow)"
            echo "===================================================="
            echo "TF-A: ${{ steps.opts.outputs.tfa_tag }}"
            echo "U-Boot: ${{ steps.opts.outputs.ub_branch }}"
            echo "DDR: DDR3-1600 (800MHz, open-source TPL from DT)"
            echo "Built (UTC): $(date -u -Iseconds)"
            echo ""
            echo "Boot flow: BootROM → TPL (DDR) → SPL → BL31 → U-Boot"
            echo "NO miniloader/Boot1 — pure mainline SPL+TPL"
            echo ""
            echo "PREBOOT (voltage scaling before kernel):"
            echo "  VDD_CPU_B (SYR827) = 1.2V  → A72 @ 1608 MHz"
            echo "  VDD_CPU_L (RK808)  = 1.0V  → A53 @ 1200 MHz"
            echo ""
            echo "Advanced bring-up features enabled:"
            echo "  - PHY debug: mii/mdio + PHY_GIGE"
            echo "  - Network forensics: pcap capture + netconsole"
            echo "  - Time sync baseline: sntp + DHCP NTP option"
            echo "  - TFTP advanced: tftpput, tftpsrv, window-size=16"
            echo "  - Safety/diagnostics: watchdog cmd + config dump"
            echo "  - PTP note: no dedicated U-Boot PTP command on RK3399 GMAC"
            echo ""
            echo "Files:"
            echo "  idbloader.img  — TPL+SPL, flash at LBA 0x40 (sector 64)"
            echo "  u-boot.itb     — FIT: U-Boot + BL31 + DTB, flash at LBA 0x4000"
            echo "  bl31.elf       — TF-A BL31 (reference)"
            echo ""
            echo "Flash to Armbian SD image (PowerShell):"
            echo '  $img = "C:\tftpboot\Armbian_...img"'
            echo '  $s = [IO.File]::Open($img, "Open", "Write", "None")'
            echo '  $idb = [IO.File]::ReadAllBytes("idbloader.img")'
            echo '  $itb = [IO.File]::ReadAllBytes("u-boot.itb")'
            echo '  $s.Seek(0x40*512, 0) | Out-Null; $s.Write($idb, 0, $idb.Length)'
            echo '  $s.Seek(0x4000*512, 0) | Out-Null; $s.Write($itb, 0, $itb.Length)'
            echo '  $s.Flush(); $s.Dispose()'
            echo ""
            echo "Or use patch_etcher_image.ps1 with -IdbLoader and -UBootItb params"
          } > "${{ github.workspace }}/artifacts/README_FLASH.txt"

      - uses: actions/upload-artifact@v4
        with:
          name: rk3399-full-boot-${{ steps.opts.outputs.tfa_tag }}-ub${{ steps.opts.outputs.ub_branch }}-ddr${{ steps.opts.outputs.ddr_mhz }}
          path: artifacts/
          if-no-files-found: error
