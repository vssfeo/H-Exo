# TF-A BL31 (v2.x) + rkbin trust_merger. Default: BL31-only (no OP-TEE) for Armbian SPL / NanoPi M4 SD.
name: RK3399 BL31 + trust.img

on:
  # Ночная/недельная сборка на серверах GitHub — без твоего ПК и без UART (артефакт trust.img в Actions).
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      tfa_tag:
        description: TrustedFirmware-A git tag (e.g. v2.14.0)
        required: true
        default: v2.14.0
      trust_profile:
        description: bl31_only = ELF PT_LOAD components. bl31_only_bin = single BL31.bin component (SPL CheckImage experiment). full_bl32_optee = stock rkbin OP-TEE.
        required: true
        default: bl31_only
        type: choice
        options:
          - bl31_only
          - bl31_only_bin
          - full_bl32_optee
  push:
    branches: [master, main]
    paths:
      - ".github/workflows/rk3399-bl31-trust.yml"
      - "patches/tf-a-v2.14-rk3399-pmusram-rsize-16k.patch"
      - "patches/u-boot-trust_merger-skip-zero-ptload.patch"
      - "patches/rktrust/**"

permissions:
  contents: read

concurrency:
  group: rk3399-bl31-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bl31-trust:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Resolve TF-A tag
        id: tfa
        run: |
          T="${{ github.event.inputs.tfa_tag }}"
          if [ -z "$T" ]; then T="v2.14.0"; fi
          echo "tag=$T" >> "$GITHUB_OUTPUT"

      - name: Resolve trust profile
        id: prof
        run: |
          P="${{ github.event.inputs.trust_profile }}"
          if [ -z "$P" ]; then P="bl31_only"; fi
          echo "profile=$P" >> "$GITHUB_OUTPUT"

      - name: Install toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            make git python3 device-tree-compiler bc gcc libc6-dev \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            gcc-arm-none-eabi binutils-arm-none-eabi

      - name: Clone Trusted Firmware-A
        run: |
          git clone --depth 1 --branch "${{ steps.tfa.outputs.tag }}" \
            https://github.com/TrustedFirmware-A/trusted-firmware-a.git \
            "${{ runner.temp }}/tfa"

      # Same change as patches/tf-a-v2.14-rk3399-pmusram-rsize-16k.patch (sed avoids tab/CRLF issues).
      - name: Enlarge PMUSRAM_RSIZE for BL31 link (8 KiB -> 16 KiB)
        run: |
          F="${{ runner.temp }}/tfa/plat/rockchip/rk3399/include/shared/addressmap_shared.h"
          grep -n PMUSRAM_RSIZE "$F"
          sed -i '/PMUSRAM_RSIZE/s/SIZE_K(8)/SIZE_K(16)/' "$F"
          grep -n PMUSRAM_RSIZE "$F"

      # Keep CPU debug power domain alive so PMCCNTR_EL0 / PMU event counters
      # tick when read from non-secure EL2/EL1.
      - name: Patch plat_rockchip_pmu_init to keep debug domain powered
        working-directory: ${{ runner.temp }}/tfa
        run: |
          F="plat/rockchip/rk3399/drivers/pmu/pmu.c"
          test -f "$F"
          if grep -q DBG_NOPWERDWN_L0_EN "$F"; then
            echo "Already patched."
          else
            awk '
              /^void plat_rockchip_pmu_init/ { in_fn = 1 }
              { print }
              in_fn && /init_pmu_counts\(\);/ {
                print ""
                print "\t/*"
                print "\t * H-Exo: Keep per-core debug power domain alive so PMCCNTR_EL0"
                print "\t * and the PMU event counters keep ticking when non-secure"
                print "\t * software (EL2/EL1) reads them. Without this, the PMU regs"
                print "\t * are read/writeable but their input clock is gated together"
                print "\t * with the core power domain, freezing the cycle counter."
                print "\t */"
                print "\tmmio_setbits_32(PMU_BASE + PMU_SFT_CON,"
                print "\t\t\tBIT(DBG_NOPWERDWN_L0_EN) |"
                print "\t\t\tBIT(DBG_NOPWERDWN_L1_EN) |"
                print "\t\t\tBIT(DBG_NOPWERDWN_L2_EN) |"
                print "\t\t\tBIT(DBG_NOPWERDWN_L3_EN) |"
                print "\t\t\tBIT(DBG_NO_PWERDWN_B0_EN) |"
                print "\t\t\tBIT(DBG_NO_PWERDWN_B1_EN));"
                in_fn = 0
              }
            ' "$F" > "$F.new"
            mv "$F.new" "$F"
          fi
          grep -n DBG_NOPWERDWN_L0_EN "$F"
          grep -n DBG_NO_PWERDWN_B0_EN "$F"

      - name: Build BL31 (RK3399, M0 via arm-none-eabi)
        working-directory: ${{ runner.temp }}/tfa
        run: |
          make -j"$(nproc)" \
            CROSS_COMPILE=aarch64-linux-gnu- \
            PLAT=rk3399 \
            DEBUG=0 \
            LOG_LEVEL=20 \
            ENABLE_ASSERTIONS=0 \
            RK3399_BAUDRATE=1500000 \
            bl31

      - name: Locate bl31.elf
        id: bl31
        run: |
          ELF=$(find "${{ runner.temp }}/tfa/build" -path '*/bl31/bl31.elf' -type f | head -1)
          if [ -z "$ELF" ] || [ ! -f "$ELF" ]; then
            echo "::error::bl31.elf not found under build/"
            find "${{ runner.temp }}/tfa/build" -type f -name '*.elf' 2>/dev/null | head -30 || true
            exit 1
          fi
          echo "path=$ELF" >> "$GITHUB_OUTPUT"
          ls -la "$ELF"

      - name: Export BL31 binary image (first PT_LOAD)
        id: bl31bin
        run: |
          ELF="${{ steps.bl31.outputs.path }}"
          BIN="${{ runner.temp }}/bl31.bin"
          LOAD_LINE=$(aarch64-linux-gnu-readelf -lW "$ELF" | awk '$1=="LOAD"{print; exit}')
          if [ -z "$LOAD_LINE" ]; then
            echo "::error::No PT_LOAD segment found in $ELF"
            exit 1
          fi
          OFF_HEX=$(echo "$LOAD_LINE" | awk '{print $2}')
          FILESZ_HEX=$(echo "$LOAD_LINE" | awk '{print $5}')
          OFF=$((OFF_HEX))
          FILESZ=$((FILESZ_HEX))
          if [ "$FILESZ" -le 0 ]; then
            echo "::error::Invalid first PT_LOAD FileSiz=$FILESZ_HEX"
            exit 1
          fi
          dd if="$ELF" of="$BIN" bs=1 skip="$OFF" count="$FILESZ" status=none
          test -s "$BIN"
          echo "path=$BIN" >> "$GITHUB_OUTPUT"
          ls -la "$BIN"

      # Stock rkbin trust_merger caps each BL3x PT_LOAD at 512 KiB; TF-A v2.14 BL31 exceeds that.
      # Build host tool from rockchip-linux u-boot (needs USE_HOSTCC + stub watchdog.h for lib/sha256.c).
      - name: Build trust_merger (2 MiB PT_LOAD cap)
        run: |
          set -e
          PROFILE="${{ steps.prof.outputs.profile }}"
          git clone --depth 1 -b next-dev https://github.com/rockchip-linux/u-boot.git "${{ runner.temp }}/ub-src"
          UB="${{ runner.temp }}/ub-src"
          git -C "$UB" apply "${{ github.workspace }}/patches/u-boot-trust_merger-skip-zero-ptload.patch"
          sed -i 's/BL3X_FILESIZE_MAX (512 \* 1024)/BL3X_FILESIZE_MAX (2048 * 1024)/' "$UB/tools/rockchip/trust_merger.c"
          if [ "$PROFILE" = "full_bl32_optee" ]; then
            sed -i 's/g_trust_max_size = 2 \* 1024 \* 1024/g_trust_max_size = 8 * 1024 * 1024/' \
              "$UB/tools/rockchip/trust_merger.c"
          else
            sed -i 's/g_trust_max_size = 2 \* 1024 \* 1024/g_trust_max_size = 4 * 1024 * 1024/' \
              "$UB/tools/rockchip/trust_merger.c"
            sed -i 's/static uint32_t g_trust_max_num = 2;/static uint32_t g_trust_max_num = 1;/' \
              "$UB/tools/rockchip/trust_merger.c"
          fi
          sed -i 's/(ulong)path/(uintptr_t)path/g; s/(ulong)gOpts\.outPath/(uintptr_t)gOpts.outPath/g' \
            "$UB/tools/rockchip/trust_merger.c"
          sed -i '/#include <linux\/compiler.h>/d' "$UB/lib/sha256.c"
          mkdir -p "${{ runner.temp }}/hoststub"
          printf '%s\n' \
            '/* host stub for u-boot lib/sha256.c */' \
            '#ifndef WATCHDOG_H' \
            '#define WATCHDOG_H' \
            '#define WATCHDOG_RESET(x) do { } while (0)' \
            '#endif' \
            > "${{ runner.temp }}/hoststub/watchdog.h"
          # Use -idirafter for u-boot/include so <stdlib.h>/<stdio.h> are glibc; angle-bracket u-boot/* still resolves.
          # sha2.c: only tools/rockchip (no u-boot/include).
          gcc -O2 -Wall -DUSE_HOSTCC -c -o "${{ runner.temp }}/sha2.o" \
            -I"$UB/tools/rockchip" \
            "$UB/tools/rockchip/sha2.c"
          gcc -O2 -Wall -DUSE_HOSTCC -include stdint.h -c -o "${{ runner.temp }}/trust_merger.o" \
            -I"$UB/tools/rockchip" \
            -I"${{ runner.temp }}/hoststub" \
            -idirafter "$UB/include" \
            "$UB/tools/rockchip/trust_merger.c"
          gcc -O2 -Wall -DUSE_HOSTCC -include stdint.h -c -o "${{ runner.temp }}/sha256.o" \
            -I"${{ runner.temp }}/hoststub" \
            -idirafter "$UB/include" \
            "$UB/lib/sha256.c"
          gcc -O2 -o "${{ runner.temp }}/trust_merger" \
            "${{ runner.temp }}/trust_merger.o" \
            "${{ runner.temp }}/sha2.o" \
            "${{ runner.temp }}/sha256.o"

      - name: Clone rkbin and merge trust.img
        run: |
          set -e
          PROFILE="${{ steps.prof.outputs.profile }}"
          git clone --depth 1 https://github.com/rockchip-linux/rkbin.git "${{ runner.temp }}/rkbin"
          mkdir -p "${{ runner.temp }}/rkbin/bin/rk33"
          cp "${{ steps.bl31.outputs.path }}" "${{ runner.temp }}/rkbin/bin/rk33/rk3399_bl31_v1.36.elf"
          cp "${{ steps.bl31bin.outputs.path }}" "${{ runner.temp }}/rkbin/bin/rk33/rk3399_bl31_v1.36.bin"
          cd "${{ runner.temp }}/rkbin"
          if [ "$PROFILE" = "full_bl32_optee" ]; then
            "${{ runner.temp }}/trust_merger" --verbose RKTRUST/RK3399TRUST.ini
          elif [ "$PROFILE" = "bl31_only_bin" ]; then
            cp "${{ github.workspace }}/patches/rktrust/RK3399TRUST-BL31ONLY-BIN.ini" \
              RKTRUST/RK3399TRUST-BL31ONLY-BIN.ini
            "${{ runner.temp }}/trust_merger" --verbose RKTRUST/RK3399TRUST-BL31ONLY-BIN.ini
          else
            cp "${{ github.workspace }}/patches/rktrust/RK3399TRUST-BL31ONLY.ini" \
              RKTRUST/RK3399TRUST-BL31ONLY.ini
            "${{ runner.temp }}/trust_merger" --verbose RKTRUST/RK3399TRUST-BL31ONLY.ini
          fi
          test -s trust.img
          ls -la trust.img

      - name: Package artifacts
        run: |
          mkdir -p "${{ github.workspace }}/artifacts"
          cp "${{ steps.bl31.outputs.path }}" "${{ github.workspace }}/artifacts/bl31.elf"
          cp "${{ steps.bl31bin.outputs.path }}" "${{ github.workspace }}/artifacts/bl31.bin"
          cp "${{ runner.temp }}/rkbin/trust.img" "${{ github.workspace }}/artifacts/trust.img"
          ( cd "${{ github.workspace }}/artifacts" && sha256sum bl31.elf bl31.bin trust.img > SHA256SUMS )
          {
            echo "TF-A tag: ${{ steps.tfa.outputs.tag }}"
            echo "Trust profile: ${{ steps.prof.outputs.profile }}"
            echo "Built (UTC): $(date -u -Iseconds)"
            echo ""
            echo "Files:"
            echo "  bl31.elf  - EL3 release; LOG_LEVEL<=20 (PMUSRAM_RSIZE=16KiB for TF-A v2.x link)"
            echo "  bl31.bin  - objcopy -O binary of bl31.elf"
            echo "  trust.img - Rockchip BL3X container (trust_merger output)"
            echo ""
            if [ "${{ steps.prof.outputs.profile }}" = "bl31_only" ]; then
              echo "bl31_only: no BL32/OP-TEE in container — intended for Armbian SPL on NanoPi M4 SD."
              echo "docs/rk3399/firmware-handoff-debug.md"
            elif [ "${{ steps.prof.outputs.profile }}" = "bl31_only_bin" ]; then
              echo "bl31_only_bin: BL31 as single .bin component (experiment for SPL CheckImage compatibility)."
              echo "docs/rk3399/spl-trust-checkimage.md"
            else
              echo "full_bl32_optee: includes rkbin OP-TEE BL32 — may break Armbian SD / SMP handoff."
            fi
            echo ""
            echo "Flash UART (PowerShell 7):"
            echo "  .\\flash_bootloader_uboot.ps1 -TrustOnly -ForceWrite -TrustFile C:\\tftpboot\\trust.img -MmcDev <N>"
            echo "PC card reader (Admin):"
            echo "  .\\tools\\write_rk3399_trust_to_sd.ps1 -TrustPath .\\trust.img -DiskNumber <N>"
            echo ""
            echo "docs/rk3399/boot-flow.md"
          } > "${{ github.workspace }}/artifacts/README_FLASH.txt"

      - uses: actions/upload-artifact@v4
        with:
          name: rk3399-trust-tfa-${{ steps.tfa.outputs.tag }}-${{ steps.prof.outputs.profile }}
          path: artifacts/
          if-no-files-found: error
