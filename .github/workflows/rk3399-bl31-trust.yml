# Reproducible RK3399 trust.img: TF-A BL31 (v2.x) + rkbin trust_merger (BL32 from rkbin).
# Produces bit-compatible layout with Rockchip tooling (not the Windows reimplementation).
name: RK3399 BL31 + trust.img

on:
  workflow_dispatch:
    inputs:
      tfa_tag:
        description: TrustedFirmware-A git tag (e.g. v2.14.0)
        required: true
        default: v2.14.0
  push:
    branches: [master, main]
    paths:
      - ".github/workflows/rk3399-bl31-trust.yml"
      - "patches/tf-a-v2.14-rk3399-pmusram-rsize-16k.patch"

permissions:
  contents: read

concurrency:
  group: rk3399-bl31-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bl31-trust:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Resolve TF-A tag
        id: tfa
        run: |
          T="${{ github.event.inputs.tfa_tag }}"
          if [ -z "$T" ]; then T="v2.14.0"; fi
          echo "tag=$T" >> "$GITHUB_OUTPUT"

      - name: Install toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            make git python3 device-tree-compiler bc gcc libc6-dev \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            gcc-arm-none-eabi binutils-arm-none-eabi

      - name: Clone Trusted Firmware-A
        run: |
          git clone --depth 1 --branch "${{ steps.tfa.outputs.tag }}" \
            https://github.com/TrustedFirmware-A/trusted-firmware-a.git \
            "${{ runner.temp }}/tfa"

      # Same change as patches/tf-a-v2.14-rk3399-pmusram-rsize-16k.patch (sed avoids tab/CRLF issues).
      - name: Enlarge PMUSRAM_RSIZE for BL31 link (8 KiB -> 16 KiB)
        run: |
          F="${{ runner.temp }}/tfa/plat/rockchip/rk3399/include/shared/addressmap_shared.h"
          grep -n PMUSRAM_RSIZE "$F"
          sed -i '/PMUSRAM_RSIZE/s/SIZE_K(8)/SIZE_K(16)/' "$F"
          grep -n PMUSRAM_RSIZE "$F"

      - name: Build BL31 (RK3399, M0 via arm-none-eabi)
        working-directory: ${{ runner.temp }}/tfa
        run: |
          make -j"$(nproc)" \
            CROSS_COMPILE=aarch64-linux-gnu- \
            PLAT=rk3399 \
            DEBUG=0 \
            LOG_LEVEL=20 \
            ENABLE_ASSERTIONS=0 \
            RK3399_BAUDRATE=1500000 \
            bl31

      - name: Locate bl31.elf
        id: bl31
        run: |
          ELF=$(find "${{ runner.temp }}/tfa/build" -path '*/bl31/bl31.elf' -type f | head -1)
          if [ -z "$ELF" ] || [ ! -f "$ELF" ]; then
            echo "::error::bl31.elf not found under build/"
            find "${{ runner.temp }}/tfa/build" -type f -name '*.elf' 2>/dev/null | head -30 || true
            exit 1
          fi
          echo "path=$ELF" >> "$GITHUB_OUTPUT"
          ls -la "$ELF"

      # Stock rkbin trust_merger caps each BL3x PT_LOAD at 512 KiB; TF-A v2.14 BL31 exceeds that.
      # Build host tool from rockchip-linux u-boot (needs USE_HOSTCC + stub watchdog.h for lib/sha256.c).
      - name: Build trust_merger (2 MiB PT_LOAD cap)
        run: |
          set -e
          git clone --depth 1 -b next-dev https://github.com/rockchip-linux/u-boot.git "${{ runner.temp }}/ub-src"
          UB="${{ runner.temp }}/ub-src"
          sed -i 's/BL3X_FILESIZE_MAX (512 \* 1024)/BL3X_FILESIZE_MAX (2048 * 1024)/' "$UB/tools/rockchip/trust_merger.c"
          sed -i 's/(ulong)path/(uintptr_t)path/g; s/(ulong)gOpts\.outPath/(uintptr_t)gOpts.outPath/g' \
            "$UB/tools/rockchip/trust_merger.c"
          sed -i '/#include <linux\/compiler.h>/d' "$UB/lib/sha256.c"
          mkdir -p "${{ runner.temp }}/hoststub"
          printf '%s\n' \
            '/* host stub for u-boot lib/sha256.c */' \
            '#ifndef WATCHDOG_H' \
            '#define WATCHDOG_H' \
            '#define WATCHDOG_RESET(x) do { } while (0)' \
            '#endif' \
            > "${{ runner.temp }}/hoststub/watchdog.h"
          # Use -idirafter for u-boot/include so <stdlib.h>/<stdio.h> are glibc; angle-bracket u-boot/* still resolves.
          # sha2.c: only tools/rockchip (no u-boot/include).
          gcc -O2 -Wall -DUSE_HOSTCC -c -o "${{ runner.temp }}/sha2.o" \
            -I"$UB/tools/rockchip" \
            "$UB/tools/rockchip/sha2.c"
          gcc -O2 -Wall -DUSE_HOSTCC -c -o "${{ runner.temp }}/trust_merger.o" \
            -I"$UB/tools/rockchip" \
            -I"${{ runner.temp }}/hoststub" \
            -idirafter "$UB/include" \
            "$UB/tools/rockchip/trust_merger.c"
          gcc -O2 -Wall -DUSE_HOSTCC -include stdint.h -c -o "${{ runner.temp }}/sha256.o" \
            -I"${{ runner.temp }}/hoststub" \
            -idirafter "$UB/include" \
            "$UB/lib/sha256.c"
          gcc -O2 -o "${{ runner.temp }}/trust_merger" \
            "${{ runner.temp }}/trust_merger.o" \
            "${{ runner.temp }}/sha2.o" \
            "${{ runner.temp }}/sha256.o"

      - name: Clone rkbin and merge trust.img
        run: |
          git clone --depth 1 https://github.com/rockchip-linux/rkbin.git "${{ runner.temp }}/rkbin"
          mkdir -p "${{ runner.temp }}/rkbin/bin/rk33"
          cp "${{ steps.bl31.outputs.path }}" "${{ runner.temp }}/rkbin/bin/rk33/rk3399_bl31_v1.36.elf"
          cd "${{ runner.temp }}/rkbin"
          "${{ runner.temp }}/trust_merger" RKTRUST/RK3399TRUST.ini
          test -s trust.img
          ls -la trust.img

      - name: Package artifacts
        run: |
          mkdir -p "${{ github.workspace }}/artifacts"
          cp "${{ steps.bl31.outputs.path }}" "${{ github.workspace }}/artifacts/bl31.elf"
          cp "${{ runner.temp }}/rkbin/trust.img" "${{ github.workspace }}/artifacts/trust.img"
          ( cd "${{ github.workspace }}/artifacts" && sha256sum bl31.elf trust.img > SHA256SUMS )
          {
            echo "TF-A tag: ${{ steps.tfa.outputs.tag }}"
            echo "Built (UTC): $(date -u -Iseconds)"
            echo "BL32: rkbin bin/rk33/rk3399_bl32_v2.12.bin (from RK3399TRUST.ini)"
            echo ""
            echo "Files:"
            echo "  bl31.elf  - EL3 release; LOG_LEVEL<=20 (PMUSRAM_RSIZE=16KiB for TF-A v2.x link)"
            echo "  trust.img - Rockchip BL3X container for SPL (trust_merger output)"
            echo ""
            echo "Flash (Windows, PowerShell 7), trust slot only:"
            echo "  .\\flash_bootloader_uboot.ps1 -TrustOnly -ForceWrite -TrustFile C:\\tftpboot\\trust.img"
            echo ""
            echo "UART: SPL should load trust without LoadTrustBL error / SDC_RequestIDMA timeout."
            echo "docs/rk3399/boot-flow.md"
          } > "${{ github.workspace }}/artifacts/README_FLASH.txt"

      - uses: actions/upload-artifact@v4
        with:
          name: rk3399-trust-tfa-${{ steps.tfa.outputs.tag }}
          path: artifacts/
          if-no-files-found: error
